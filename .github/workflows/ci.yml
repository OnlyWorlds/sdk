name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      # `npm test` runs pretest (tsup build) then node --test against the
      # compiled dist bundle — the same artifact npm publish ships.
      - run: npm test
